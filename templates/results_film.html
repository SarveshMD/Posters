
{% extends "layout.html" %}

{% block title %}
{{ search_query }} - Posters
{% endblock %}

{% block body %}
    {% for result in results %}
        <div class="card">
            <h2>{{ result.get("original_title") }}</h2>
            <p>{{ result["release_date"][:4] }}</p>
            <p>{{ result["overview"] }}</p>
        </div>
    {% endfor %}
{% endblock %}
